name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Build for production
        run: npm run build

      - name: Build Docker image
        run: |
          echo "FROM node:20-alpine as builder"
          echo "WORKDIR /app"
          echo "COPY package*.json ./"
          echo "RUN npm ci --only=production"
          echo "COPY . ."
          echo "RUN npm run build"
          echo "FROM node:20-alpine as runner"
          echo "WORKDIR /app"
          echo "COPY --from=builder /app/dist ./dist"
          echo "COPY --from=builder /app/node_modules ./node_modules"
          echo "COPY --from=builder /app/package.json ./package.json"
          echo "EXPOSE 5173"
          echo "CMD [\"npm\", \"run\", \"preview\"]" > Dockerfile
          docker build -t swift-template-gallery:latest .

      - name: Save Docker image
        run: |
          docker save swift-template-gallery:latest | gzip > swift-template-gallery.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: swift-template-gallery.tar.gz
          retention-days: 7

